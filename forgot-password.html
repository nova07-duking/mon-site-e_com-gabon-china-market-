<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mot de passe oublié | GCMarket</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo">
        <div class="logo-icon"><script src="js/app.js"></script><script>document.write(ICONS.globe)</script></div>
        <span>GC<span class="accent">Market</span></span>
      </a>
      <div class="nav-links" id="navLinks">
        <a href="index.html">Accueil</a>
      </div>
      <div class="nav-actions">
        <a href="login.html" class="btn btn-secondary btn-sm">Connexion</a>
        <a href="register.html" class="btn btn-primary btn-sm">Inscription</a>
      </div>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <div class="text-center" style="margin-bottom: var(--space-lg);">
        <script>document.write(ICONS.mail)</script>
      </div>
      <h2>Mot de passe oublié</h2>
      <p class="subtitle text-muted">Veuillez entrer votre adresse email. Si celle-ci correspond à un compte, nous vous enverrons un lien de réinitialisation.</p>

      <form id="forgotForm" onsubmit="handleForgot(event)">
        <div class="form-group">
          <label class="form-label">Adresse email</label>
          <input type="email" id="forgotEmail" class="form-input" placeholder="votre@email.ga" required>
        </div>

        <button id="forgotBtn" type="submit" class="btn btn-primary btn-lg" style="width: 100%;">Envoyer le lien</button>

        <div class="mt-xl text-center" style="margin-top: var(--space-xl);">
          <p class="text-sm"><a href="login.html">Retour à la connexion</a></p>
        </div>
      </form>
    </div>
  </div>

  <script src="js/mock-data.js"></script>
  <script>
    async function handleForgot(e) {
      e.preventDefault();
      const email = document.getElementById('forgotEmail').value;
      
      const btn = document.getElementById('forgotBtn');
      btn.disabled = true;
      btn.textContent = 'Envoi en cours...';

      try {
        const response = await apiFetch('/auth/forgot-password', {
          method: 'POST',
          body: JSON.stringify({ email })
        });
        showToast(response.message || 'Lien de réinitialisation envoyé', 'success', 5000);
        setTimeout(() => { window.location.href = 'login.html'; }, 3000);
      } catch (error) {
        showToast(error.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Envoyer le lien';
      }
    }
  </script>
</body>
</html>
