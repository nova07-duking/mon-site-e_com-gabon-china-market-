<!DOCTYPE html>
<html lang="fr" data-theme="ocean">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vérification OTP - Gabon-China Market</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="glass-container">
        <div class="auth-box">
            <div class="auth-header">
                <i class="fas fa-shield-alt logo-icon"></i>
                <h1>Vérification</h1>
                <p>Saisissez le code reçu par email</p>
            </div>
            
            <form id="otpForm" class="auth-form">
                <div class="form-group">
                    <label for="otpEmail">Email</label>
                    <input type="email" id="otpEmail" readonly required>
                </div>
                
                <div class="form-group">
                    <label for="otpCode">Code OTP (6 chiffres)</label>
                    <input type="text" id="otpCode" maxlength="6" placeholder="000000" required>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">Vérifier le compte</button>
            </form>
            
            <div class="auth-footer">
                <p>Pas reçu le code ? <a href="#" id="resendOtp">Renvoyer</a></p>
                <a href="login.html" class="back-link"><i class="fas fa-arrow-left"></i> Retour à la connexion</a>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const email = urlParams.get('email');
            
            if (email) {
                document.getElementById('otpEmail').value = email;
            } else {
                window.location.href = 'register.html';
            }
            
            const otpForm = document.getElementById('otpForm');
            otpForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const otp = document.getElementById('otpCode').value;
                
                try {
                    const response = await apiFetch('/api/auth/verify-otp', {
                        method: 'POST',
                        body: JSON.stringify({ email, otp })
                    });
                    
                    if (response.message && response.message.includes('succès')) {
                        showToast(response.message, 'success');
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 2000);
                    } else {
                        showToast(response.message || 'Code invalide', 'error');
                    }
                } catch (error) {
                    showToast('Erreur de connexion au serveur', 'error');
                }
            });
        });
    </script>
</body>
</html>
