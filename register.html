<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription | GCMarket</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo">
        <div class="logo-icon"><script src="js/app.js"></script><script>document.write(ICONS.globe)</script></div>
        <span>GC<span class="accent">Market</span></span>
      </a>
      <div class="nav-links" id="navLinks">
        <a href="index.html">Accueil</a>
        <a href="catalogue.html">Catalogue</a>
        <a href="mbshop.html">MB Shop</a>
        <a href="tracking.html">Suivi Chine</a>
      </div>
      <div class="nav-actions">
        <a href="login.html" class="btn btn-secondary btn-sm">Connexion</a>
        <a href="register.html" class="btn btn-primary btn-sm">Inscription</a>
      </div>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <h2>Créer un compte</h2>
      <p class="subtitle text-muted">Rejoignez la plus grande marketplace du Gabon.</p>

      <form id="registerForm" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label class="form-label">Nom complet</label>
          <input type="text" class="form-input" id="regName" placeholder="Jean-Pierre Moussavou" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">Adresse email</label>
          <input type="email" class="form-input" id="regEmail" placeholder="votre@email.ga" required>
        </div>

        <div class="form-group">
          <label class="form-label">Mot de passe</label>
          <input type="password" class="form-input" id="regPassword" placeholder="••••••••" required minlength="6">
        </div>

        <div class="form-group">
          <label class="form-label">Je souhaite m'inscrire en tant que :</label>
          <select class="form-select" id="regRole" required onchange="toggleSellerType()">
            <option value="ACHETEUR">Acheteur (Acheter, Louer, Importer)</option>
            <option value="VENDEUR">Vendeur (Publier des annonces)</option>
          </select>
        </div>

        <!-- NEW: Seller Type Selection (hidden by default) -->
        <div class="form-group hidden" id="sellerTypeGroup">
          <label class="form-label">Type de Vendeur :</label>
          <input type="hidden" id="regSellerType" value="vehicule" required>
          <div class="seller-type-grid">
            <div class="seller-type-card selected" onclick="selectSellerType('vehicule', this)">
              <div class="type-icon"><script>document.write(ICONS.car)</script></div>
              <h4>Véhicules</h4>
              <p class="text-muted">Ventes & Locations</p>
            </div>
            <div class="seller-type-card" onclick="selectSellerType('immo', this)">
              <div class="type-icon"><script>document.write(ICONS.building)</script></div>
              <h4>Immobilier</h4>
              <p class="text-muted">Maisons & Appartements</p>
            </div>
          </div>
        </div>

        <label style="display: flex; gap: var(--space-sm); align-items: flex-start; margin-bottom: var(--space-xl); cursor: pointer;">
          <input type="checkbox" required style="margin-top: 4px;">
          <span style="font-size: 0.85rem; color: var(--text-secondary);">
            J'accepte les <a href="#">Conditions Générales d'Utilisation</a> et la politique de confidentialité de GCMarket.
          </span>
        </label>

        <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">Créer mon compte</button>

        <div class="mt-xl text-center" style="margin-top: var(--space-xl);">
          <p class="text-sm">Déjà un compte ? <a href="login.html">Connectez-vous</a></p>
        </div>
      </form>
    </div>
  </div>

  <script src="js/mock-data.js"></script>
  <script>
    function toggleSellerType() {
      const role = document.getElementById('regRole').value;
      const group = document.getElementById('sellerTypeGroup');
      if (role === 'VENDEUR') {
        group.classList.remove('hidden');
      } else {
        group.classList.add('hidden');
      }
    }

    function selectSellerType(type, element) {
      document.getElementById('regSellerType').value = type;
      document.querySelectorAll('.seller-type-card').forEach(c => c.classList.remove('selected'));
      element.classList.add('selected');
    }

    async function handleRegister(e) {
      e.preventDefault();
      const username = document.getElementById('regName').value;
      const email = document.getElementById('regEmail').value;
      const password = document.getElementById('regPassword').value;
      const role = document.getElementById('regRole').value;
      const sellerType = role === 'VENDEUR' ? document.getElementById('regSellerType').value : null;
      
      const submitBtn = document.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Création en cours...';

      try {
        await AuthManager.register(username, email, password, role, sellerType);
        showToast('Compte créé avec succès ! Connexion...', 'success');
        
        await AuthManager.login(username, password);
        setTimeout(() => {
          window.location.href = AuthManager.getDashboardLink();
        }, 1000);
      } catch (error) {
        showToast(error.message, 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Créer mon compte';
      }
    }
  </script>
</body>
</html>
