<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon Panier | GCMarket</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo">
        <div class="logo-icon"><script src="js/app.js"></script><script>document.write(ICONS.globe)</script></div>
        <span>GC<span class="accent">Market</span></span>
      </a>
      <div class="nav-links" id="navLinks">
        <a href="index.html">Accueil</a>
        <a href="catalogue.html">Catalogue</a>
        <a href="mbshop.html">MB Shop</a>
        <a href="tracking.html">Suivi Chine</a>
      </div>
      <div class="nav-actions"></div>
      <button class="nav-toggle" id="navToggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <section class="section container" style="padding-top: calc(var(--nav-height) + var(--space-2xl)); min-height: 100vh;">
    <h1 class="mb-xl">Mon Panier</h1>

    <div class="grid" style="grid-template-columns: 2fr 1fr; gap: var(--space-2xl);">
      <!-- Cart Items -->
      <div>
        <div id="cartItemsList" class="grid gap-md">
          <!-- JS will populate -->
          <div class="text-center py-4xl">
            <p class="text-muted">Chargement de votre panier...</p>
          </div>
        </div>
      </div>

      <!-- Summary -->
      <div>
        <div class="card" style="padding: var(--space-xl); position: sticky; top: calc(var(--nav-height) + 20px);">
          <h3 class="mb-lg">Récapitulatif</h3>
          <div class="flex-between mb-sm">
            <span>Articles</span>
            <span id="cartCount">0</span>
          </div>
          <div class="flex-between mb-lg" style="font-size: 1.25rem; font-weight: 700; color: var(--yellow);">
            <span>Total</span>
            <span id="cartTotal">0 FCFA</span>
          </div>
          <button id="checkoutBtn" class="btn btn-primary btn-lg" style="width: 100%;" onclick="processCheckout()">
            Passer la commande
          </button>
          <p class="text-xs text-muted mt-md text-center">Paiement sécurisé. Livraison sous 24h-48h à Libreville.</p>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container text-center">
      <p class="text-muted">© 2026 GCMarket & MB Shop.</p>
    </div>
  </footer>

  <script src="js/mock-data.js"></script>
  <script>
    function updateCartDisplay() {
      const cart = CartManager.get();
      const container = document.getElementById('cartItemsList');
      const cartCount = document.getElementById('cartCount');
      const cartTotal = document.getElementById('cartTotal');
      const checkoutBtn = document.getElementById('checkoutBtn');

      if (cart.length === 0) {
        container.innerHTML = `
          <div class="card text-center" style="padding: var(--space-4xl);">
            <div style="font-size: 3rem; color: var(--text-muted); margin-bottom: var(--space-md);">${icon('shoppingCart')}</div>
            <h3>Votre panier est vide</h3>
            <p class="mb-xl">Découvrez nos produits exclusifs et trouvez votre bonheur.</p>
            <a href="catalogue.html" class="btn btn-primary">Voir le catalogue</a>
          </div>
        `;
        cartCount.textContent = '0';
        cartTotal.textContent = '0 FCFA';
        checkoutBtn.disabled = true;
        return;
      }

      container.innerHTML = cart.map(item => `
        <div class="card" style="padding: var(--space-md); display: flex; gap: var(--space-lg); align-items: center;">
          <img src="${item.image}" style="width: 80px; height: 80px; border-radius: 8px; object-fit: cover;">
          <div style="flex: 1;">
            <h4 style="margin:0;">${item.title}</h4>
            <p class="text-sm">Quantité: ${item.quantity}</p>
          </div>
          <div class="text-right">
            <div style="font-weight: 700; color: var(--yellow);">${formatPrice(item.price * item.quantity)} ${item.currency}</div>
            <button class="btn btn-sm" style="color: var(--error); padding: 5px;" onclick="removeFromCart(${item.id})">
              ${icon('trash', 'icon-sm')} Supprimer
            </button>
          </div>
        </div>
      `).join('');

      const total = cart.reduce((acc, item) => acc + (item.price * item.quantity), 0);
      cartCount.textContent = cart.reduce((acc, item) => acc + item.quantity, 0);
      cartTotal.textContent = formatPrice(total) + ' FCFA';
      checkoutBtn.disabled = false;
    }

    function removeFromCart(id) {
      CartManager.remove(id);
      updateCartDisplay();
    }

    async function processCheckout() {
      if (!AuthManager.isLoggedIn()) {
        showToast('Veuillez vous connecter pour commander', 'warning');
        setTimeout(() => window.location.href = 'login.html', 1500);
        return;
      }

      const cart = CartManager.get();
      const user = AuthManager.currentUser;
      const btn = document.getElementById('checkoutBtn');
      
      btn.disabled = true;
      btn.textContent = 'Traitement en cours...';

      try {
        // Envoi des commandes une par une (le backend actuel semble gérer 1 produit par Order)
        for (const item of cart) {
          const orderData = {
            totalPrice: item.price * item.quantity,
            quantity: item.quantity,
            status: 'PENDING',
            type: item.isMbShop ? 'COMMANDE_MB' : 'COMMANDE_STANDARD', // Simplification
            buyer: { id: user.id },
            product: { id: item.id }
          };
          await OrderManager.create(orderData);
        }

        showToast('Commande envoyée avec succès !', 'success');
        CartManager.clear();
        setTimeout(() => window.location.href = 'dashboard-buyer.html', 2000);
      } catch (err) {
        console.error(err);
        showToast('Erreur lors de la commande', 'error');
        btn.disabled = false;
        btn.textContent = 'Passer la commande';
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      AuthManager.init();
      updateCartDisplay();
    });
  </script>
</body>
</html>
