<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Réinitialiser le mot de passe | GCMarket</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo">
        <div class="logo-icon"><script src="js/app.js"></script><script>document.write(ICONS.globe)</script></div>
        <span>GC<span class="accent">Market</span></span>
      </a>
      <div class="nav-links" id="navLinks">
        <a href="index.html">Accueil</a>
      </div>
      <div class="nav-actions">
        <a href="login.html" class="btn btn-secondary btn-sm">Connexion</a>
      </div>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <div class="text-center" style="margin-bottom: var(--space-lg);">
        <script>document.write(ICONS.shield)</script>
      </div>
      <h2>Nouveau mot de passe</h2>
      <p class="subtitle text-muted">Veuillez choisir un nouveau mot de passe pour votre compte.</p>

      <form id="resetForm" onsubmit="handleReset(event)">
        <div class="form-group">
          <label class="form-label">Nouveau mot de passe</label>
          <input type="password" id="newPassword" class="form-input" placeholder="••••••••" required minlength="6">
        </div>

        <button id="resetBtn" type="submit" class="btn btn-primary btn-lg" style="width: 100%;">Enregistrer</button>
      </form>
    </div>
  </div>

  <script src="js/mock-data.js"></script>
  <script>
    async function handleReset(e) {
      e.preventDefault();
      
      const newPassword = document.getElementById('newPassword').value;
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      
      if (!token) {
          showToast('Le lien de réinitialisation est invalide ou manquant.', 'error');
          return;
      }
      
      const btn = document.getElementById('resetBtn');
      btn.disabled = true;
      btn.textContent = 'Enregistrement...';

      try {
        const response = await apiFetch('/auth/reset-password', {
          method: 'POST',
          body: JSON.stringify({ token, newPassword })
        });
        showToast(response.message || 'Mot de passe modifié avec succès', 'success', 3000);
        setTimeout(() => { window.location.href = 'login.html'; }, 2000);
      } catch (error) {
        showToast(error.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Enregistrer';
      }
    }
  </script>
</body>
</html>
